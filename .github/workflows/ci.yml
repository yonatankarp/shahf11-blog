name: Site CI

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check blog assets
        run: npm run check:blog-assets

      - name: Build
        run: npm run build

      - name: Check generated site metadata
        run: npm run check:site-metadata

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Capture visual smoke screenshots
        run: npm run visual:capture

      - name: Upload visual smoke screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: visual-smoke-screenshots
          path: screenshots/*.png
          if-no-files-found: ignore
          retention-days: 14

  dependabot_auto_merge:
    needs: build
    if: ${{ github.event_name == 'pull_request' && github.actor == 'dependabot[bot]' }}
    permissions:
      contents: write
      pull-requests: write
    uses: yonatankarp/github-actions/.github/workflows/dependabot-auto-merge.yml@v2
    secrets:
      GITHUB_PAT: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
